<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Галерея концептов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="menu">
        <a href="index.html" class="button">🎲 Генератор</a>
        <a href="catalog.html" class="button">📚 Жанры</a>
        <a href="gallery.html" class="button">🖼️ Галерея</a>
        <a href="contacts.html" class="button">✉️ Контакты</a>
    </div>

    <div class="container">
        <h1>🖼️ Галерея вдохновения</h1>
        <p>Нажми ❤️ чтобы сохранить любимый концепт</p>

        <div class="gallery-grid">
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=300" alt="Cyberpunk"><p>Киберпанк-город</p><button class="like-btn" data-name="Киберпанк-город">❤️ Лайк</button></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=300" alt="Fantasy"><p>Фэнтези лес</p><button class="like-btn" data-name="Фэнтези лес">❤️ Лайк</button></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1617814065893-00757124ef6a?w=300" alt="Space"><p>Космическая станция</p><button class="like-btn" data-name="Космическая станция">❤️ Лайк</button></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1614294148960-50aa526b6b0b?w=300" alt="Pixel"><p>Пиксельная RPG</p><button class="like-btn" data-name="Пиксельная RPG">❤️ Лайк</button></div>
        </div>

        <div class="likes-block">
            <h3>⭐ Твои любимые концепты</h3>
            <div id="likesList"></div>
            <button id="resetLikesBtn" class="reset-btn">🗑️ Сбросить лайки</button>
        </div>
    </div>

    <script>
        function loadLikes() {
            const likes = JSON.parse(localStorage.getItem('likedConcepts') || '[]');
            const container = document.getElementById('likesList');
            if (likes.length === 0) container.innerHTML = '<p>Пока ничего не лайкнуто</p>';
            else container.innerHTML = '<ul>' + likes.map(l => `<li>❤️ ${l}</li>`).join('') + '</ul>';
        }

        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.onclick = () => {
                let likes = JSON.parse(localStorage.getItem('likedConcepts') || '[]');
                const name = btn.dataset.name;
                if (!likes.includes(name)) {
                    likes.push(name);
                    localStorage.setItem('likedConcepts', JSON.stringify(likes));
                    alert(`✅ "${name}" в любимых!`);
                    loadLikes();
                } else alert(`"${name}" уже в любимых`);
            };
        });

        document.getElementById('resetLikesBtn').onclick = () => {
            localStorage.removeItem('likedConcepts');
            loadLikes();
            alert('Лайки сброшены');
        };
        loadLikes();
    </script>
</body>
</html>
